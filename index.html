<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Account Creation</title>

    <!-- Styling -->
    <style>
    body {
        font-family:'Times New Roman', Times, serif;
        display: flex;
        justify-content: center;
        padding-top: 150px;
        align-items: center;
        background: linear-gradient(to right, #f5d1ea, #df8c9f, #df8c9f, #f5d1ea);
    }

    .container {
        background: white;
        padding: 50px;
        width: 600px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        font-family: 'Times New Roman', Times, serif;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #322e2e;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        cursor: pointer;
        background: linear-gradient(to right, #f5d1ea, #df8c9f, #df8c9f, #f5d1ea);
    }

    #message {
        font-family: 'Times New Roman', Times, serif;
        margin-top: 15px;
        font-size: 20px;
    }

    </style>
    </head>

    <!-- Form -->

    <body>

    <div class="container">
    <h2>Intramurals 2026 Sign Up</h2>

    <input type="text" id="fullname" placeholder="Enter Full Name">
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <br><br>

    <button py-click="signup">Sign up</button>

    <p id="message"></p>

    <!-- Refresh Button -->
    <button class="" onclick="location.reload()">Refresh</button>
    </div>

    </div>

    <!-- Python File -->

    <script type="py" src="main.py"></script>

    </body>
    </html>
